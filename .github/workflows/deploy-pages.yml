name: Deploy web to GitHub Pages

# Builds the web game and publishes dist/ to GitHub Pages.
# Vite is configured with base: "./" (relative URLs), so the site works whether
# it's served from a project subpath (https://USER.github.io/pong-kat/) or a
# custom domain.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "index.html"
      - "package.json"
      - "vite.config.ts"
      - "tsconfig.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Permissions the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let a newer one supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build web bundle
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
